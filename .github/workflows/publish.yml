# RK Word Editor — CI / npm publish (single-job to avoid startup_failure
# triggered by job-level `if:` + `needs:` validation).

name: CI / Publish

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci
      - run: npm run build
      - run: npm test --workspaces --if-present

      # Publish on tag pushes only.
      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm run build:packages
          npm run build --workspace=@raazkhnl/rk-editor-cli
          npm publish --workspace=@raazkhnl/rk-editor-core --access public
          npm publish --workspace=@raazkhnl/rk-editor-ui   --access public
          npm publish --workspace=@raazkhnl/rk-editor-cli  --access public
