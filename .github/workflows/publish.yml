# RK Word Editor — CI/CD
# - Builds and tests on every push & PR.
# - Publishes core / ui / cli to npm when a tag matching v*.*.* is pushed.
# - Deploys the demo to GitHub Pages on every push to the default branch.

name: CI/CD - Build, Test, Publish, Deploy

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# A single concurrency lane per ref keeps Pages from racing with itself.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build all packages and demo
        run: npm run build

      - name: Run Tests
        run: npm test --workspaces --if-present

      - name: Upload demo bundle
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: demo-dist
          path: apps/demo/dist
          retention-days: 7

  publish:
    name: Publish to NPM
    needs: build-test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build Packages
        run: npm run build:packages

      - name: Publish @raazkhnl/rk-editor-core
        run: npm publish --workspace=@raazkhnl/rk-editor-core --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @raazkhnl/rk-editor-ui
        run: npm publish --workspace=@raazkhnl/rk-editor-ui --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @raazkhnl/rk-editor-cli
        run: npm publish --workspace=@raazkhnl/rk-editor-cli --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  deploy-ghpages:
    name: Deploy demo to GitHub Pages
    needs: build-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build demo with Pages base path
        # Vite's `base` resolves automatically from $GITHUB_REPOSITORY thanks to
        # the demo's vite.config.ts (see RK_DEMO_BASE / GITHUB_REPOSITORY logic).
        run: npm run build

      - name: Add SPA 404 fallback
        run: cp apps/demo/dist/index.html apps/demo/dist/404.html

      - name: Disable Jekyll on Pages
        run: touch apps/demo/dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/demo/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
