# RK Word Editor — CI / npm publish
# - Builds and tests on every push & PR.
# - Publishes core / ui / cli to npm when a tag matching v*.*.* is pushed.
#
# This workflow deliberately does NOT request `id-token: write`. That
# permission requires the repo's Settings → Actions → General → "Workflow
# permissions" to be at least "Read and write permissions"; if it's set to
# the default "Read repository contents and packages permissions", any
# workflow that asks for id-token: write fails to schedule (startup_failure)
# before any job runs. Skipping it costs only npm-provenance signing, which
# is a nice-to-have, not a requirement.

name: CI / Publish

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build all packages and demo
        run: npm run build

      - name: Run Tests
        run: npm test --workspaces --if-present

  publish:
    name: Publish to NPM
    needs: build-test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build Packages
        run: npm run build:packages

      - name: Build CLI
        run: npm run build --workspace=@raazkhnl/rk-editor-cli

      - name: Publish @raazkhnl/rk-editor-core
        run: npm publish --workspace=@raazkhnl/rk-editor-core --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @raazkhnl/rk-editor-ui
        run: npm publish --workspace=@raazkhnl/rk-editor-ui --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @raazkhnl/rk-editor-cli
        run: npm publish --workspace=@raazkhnl/rk-editor-cli --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
