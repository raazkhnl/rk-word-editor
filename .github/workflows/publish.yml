# RK Word Editor — CI / npm publish
# - Builds and tests on every push & PR.
# - Publishes core / ui / cli to npm when a tag matching v*.*.* is pushed.

name: CI / Publish

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build all packages and demo
        run: npm run build

      - name: Run Tests
        run: npm test --workspaces --if-present

  publish:
    name: Publish to NPM
    needs: build-test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build Packages
        run: npm run build:packages

      - name: Publish @raazkhnl/rk-editor-core
        run: npm publish --workspace=@raazkhnl/rk-editor-core --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @raazkhnl/rk-editor-ui
        run: npm publish --workspace=@raazkhnl/rk-editor-ui --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @raazkhnl/rk-editor-cli
        run: npm publish --workspace=@raazkhnl/rk-editor-cli --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
