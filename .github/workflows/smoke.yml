# Diagnostic-only workflow.
# Each job adds one piece of complexity vs the previous green smoke test
# so we can pinpoint exactly which feature triggers the prior startup_failure.
# Delete this file once the actual workflows are healthy.

name: Smoke test

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  a-just-echo:
    runs-on: ubuntu-latest
    steps:
      - run: echo "level 1 - bare echo (already green previously)"

  b-checkout-only:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "level 2 - actions/checkout works"

  c-checkout-and-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node -v && echo "level 3 - setup-node without cache works"

  d-checkout-node-and-cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: echo "level 4 - setup-node WITH cache:npm works"

  e-named-job-with-many-triggers:
    name: Named job mirroring publish.yml structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: echo "level 5 - npm ci on monorepo works"
